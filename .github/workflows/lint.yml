name: Lint

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        run: shellcheck $(git ls-files '*.sh')

  shfmt:
    runs-on: ubuntu-latest
    env:
      SHFMT_VERSION: v3.13.1
    steps:
      - uses: actions/checkout@v7
      - name: Install shfmt
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" -o "$RUNNER_TEMP/shfmt"
          chmod +x "$RUNNER_TEMP/shfmt"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Check formatting (shfmt -d, uses .editorconfig)
        run: shfmt -d $(git ls-files '*.sh')
